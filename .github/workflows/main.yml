name: Build Android APK from ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files Automatically
      run: |
        unzip -o *.zip -d .
        if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
          echo "Looking for project files in subdirectories..."
          SUBDIR=$(find . -maxdepth 2 -name "app" -type d -exec dirname {} \;)
          if [ "$SUBDIR" != "." ] && [ ! -z "$SUBDIR" ]; then
            mv $SUBDIR/* . 2>/dev/null || true
          fi
        fi

    - name: Create Fake Google Services JSON
      run: |
        # إنشاء ملف فايربيس وهمي لتخطي خطأ التجميع بنجاح
        mkdir -p app
        echo '{"project_info":{"project_number":"123","project_id":"fake","storage_bucket":"fake"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.example.app"}},"api_key":[{"current_key":"fake"}],"services":{}}],"configuration_version":"3"}' > app/google-services.json

    - name: Create Temporary Debug Keystore
      run: |
        # توليد ملف keystore مؤقت لحل خطأ التوقيع المفقود
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          echo "gradlew not found, creating a new wrapper..."
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: school-app-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/debug/*.apk
